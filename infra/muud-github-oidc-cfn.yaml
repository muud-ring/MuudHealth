AWSTemplateFormatVersion: '2010-09-09'
Description: GitHub Actions OIDC provider and deploy role for MuudHealth

Parameters:
  GitHubOrg:
    Type: String
    Default: muud-ring
  GitHubRepo:
    Type: String
    Default: MuudHealth

Resources:
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  MuudGitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: MuudGitHubActionsDeployRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOIDCProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub 'repo:${GitHubOrg}/${GitHubRepo}:*'
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonECS_FullAccess
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryPowerUser
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/CloudFrontFullAccess

Outputs:
  RoleArn:
    Value: !GetAtt MuudGitHubActionsDeployRole.Arn
    Export:
      Name: MuudGitHubActionsDeployRoleArn
