name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npx eslint src/
      - name: Test with coverage
        run: npx jest --forceExit --detectOpenHandles --coverage
      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 14

  frontend-analyze-test:
    name: Frontend Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - name: Analyze
        run: flutter analyze --no-fatal-infos
      - name: Test with coverage
        run: flutter test --coverage
      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 14

  security-check:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Backend dependency audit
        working-directory: backend
        run: npm audit --audit-level=high || true
      - name: Check for secrets in code
        run: |
          # Fail if hardcoded AWS keys or passwords are found in source
          if grep -rn 'AKIA[0-9A-Z]\{16\}' --include='*.js' --include='*.dart' --include='*.ts' .; then
            echo "::error::Possible AWS access key found in source code"
            exit 1
          fi

  frontend-build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [frontend-analyze-test]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: frontend/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
