# Muud Health — Continuous Deployment Pipeline
# © Muud Health — Armin Hoes, MD
#
# Triggers on every push to main and on manual dispatch.
# Builds and deploys backend to AWS ECS/Fargate,
# builds Flutter apps for Android and iOS distribution.

name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: muud-health-api
  ECS_CLUSTER: muud-production
  ECS_SERVICE: muud-api-service
  ECS_TASK_DEFINITION: .aws/task-definition.json

jobs:
  # ── Backend: Build Docker + Deploy to ECS ───────────────────────────
  deploy-backend:
    name: Deploy Backend to ECS
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: muud-api
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Post-deploy health check
        run: |
          echo "Waiting for service to stabilize..."
          sleep 30
          HEALTH_URL="${{ secrets.API_BASE_URL }}/health"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "Health check passed (HTTP $STATUS)"
          else
            echo "Health check failed (HTTP $STATUS)"
            exit 1
          fi

  # ── Android: Build App Bundle ───────────────────────────────────────
  build-android:
    name: Build Android App Bundle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks

      - name: Build App Bundle
        env:
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          flutter build appbundle --release \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: frontend/build/app/outputs/bundle/release/*.aab
          retention-days: 30

  # ── iOS: Build IPA ─────────────────────────────────────────────────
  # NOTE: iOS distribution cert is currently expired. Job is marked
  # continue-on-error at every step so CD pipeline is not blocked by
  # the signing failure. A locally-built, signed IPA (v2.1.3+8) is
  # being uploaded to TestFlight out-of-band via `xcrun altool`.
  # TODO: rotate IOS_DIST_CERT_P12_BASE64 secret, then remove the
  # continue-on-error flags below.
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Install CocoaPods
        continue-on-error: true
        run: cd ios && pod install --repo-update

      - name: Import signing certificate
        id: import-cert
        continue-on-error: true
        env:
          P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          echo "$P12_BASE64" | base64 -d > $RUNNER_TEMP/cert.p12
          if ! security import $RUNNER_TEMP/cert.p12 -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign; then
            echo "::warning::iOS distribution cert import failed — cert is likely expired. Skipping build."
            echo "cert_ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          security list-keychains -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "" $KEYCHAIN_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          echo "cert_ok=true" >> "$GITHUB_OUTPUT"

      - name: Build IPA
        if: steps.import-cert.outputs.cert_ok == 'true'
        continue-on-error: true
        run: |
          flutter build ipa --release \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }} \
            --export-options-plist=ios/ExportOptions.plist

      - name: Upload IPA artifact
        if: steps.import-cert.outputs.cert_ok == 'true'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: frontend/build/ios/ipa/*.ipa
          retention-days: 30
